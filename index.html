<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Planet Castle</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; }
        .container { max-width: 800px; margin: 0 auto; text-align: center; }
        .card { border: 1px solid #333; padding: 15px; margin: 10px; border-radius: 8px; background: #111; }
        .hidden { display: none; }
        button { background: #333; color: #fff; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; }
        input, textarea { width: 90%; margin: 5px; padding: 10px; background: #222; border: 1px solid #444; color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <img src="castle.png" id="logo" width="150" alt="Logo">
    <h1>Planet Castle</h1>
    
    <div id="auth-section">
        <button id="login-btn">Sign in with Google</button>
    </div>

    <div id="user-actions" class="hidden">
        <button onclick="showForm('Deck')">Submit a Deck</button>
        <button onclick="showForm('Plugin')">Submit a Plugin</button>
        <button onclick="showForm('Party')">Invite to a Party</button>
    </div>

    <div id="submit-form" class="hidden">
        <h2 id="form-title"></h2>
        <input type="text" id="title" placeholder="Title">
        <textarea id="description" placeholder="Description"></textarea>
        <input type="url" id="url" placeholder="URL">
        <button onclick="saveData()">Submit</button>
    </div>

    <section id="main-content">
        <h2>Newest Projects</h2>
        <div id="project-list"></div>
    </section>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

    const firebaseConfig = {
        // BURAYA KENDİ CONFIG BİLGİLERİNİ YAPIŞTIR (EKSİKSİZ)
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const provider = new GoogleAuthProvider();

    let currentUser = null;
    let currentType = "";

    // 1. Auth Durumu
    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            document.getElementById('auth-section').innerHTML = `Welcome, ${user.displayName}`;
            document.getElementById('user-actions').classList.remove('hidden');
        }
    });

    // 2. Google Giriş
    document.getElementById('login-btn').onclick = () => signInWithPopup(auth, provider);

    // 3. Form Yönetimi
    window.showForm = (type) => {
        currentType = type;
        document.getElementById('form-title').innerText = "Submit a " + type;
        document.getElementById('submit-form').classList.remove('hidden');
    };

    window.saveData = () => {
        const title = document.getElementById('title').value;
        const description = document.getElementById('description').value;
        const url = document.getElementById('url').value;
        
        push(ref(db, 'projects'), { title, description, url, author: currentUser.displayName, type: currentType }).then(() => {
            alert("Success!");
            document.getElementById('submit-form').classList.add('hidden');
        });
    };

    // 4. Projeleri Listeleme (Daha güvenli yöntem)
    onValue(ref(db, 'projects'), (snapshot) => {
        const list = document.getElementById('project-list');
        list.innerHTML = "";
        snapshot.forEach((child) => {
            const data = child.val();
            list.innerHTML += `
                <div class="card">
                    <h3>${data.title} (${data.type})</h3>
                    <p>${data.description}</p>
                    <a href="${data.url}" target="_blank" style="color: cyan;">Visit Project</a>
                </div>`;
        });
    });
</script>
</body>
</html>
