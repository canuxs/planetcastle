<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Planet Castle</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; }
        .container { max-width: 800px; margin: 0 auto; text-align: center; }
        .card { border: 1px solid #333; padding: 15px; margin: 10px; border-radius: 8px; }
        .hidden { display: none; }
        button { background: #333; color: #fff; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <img src="castle.png" id="logo" width="150">
    <h1>Planet Castle</h1>
    
    <div id="auth-section">
        <button id="login-btn">Sign in with Google</button>
    </div>

    <nav id="user-actions" class="hidden">
        <button onclick="showForm('Deck')">Submit a Deck</button>
        <button onclick="showForm('Plugin')">Submit a Plugin</button>
        <button onclick="showForm('Party')">Invite to a Party</button>
    </nav>

    <div id="project-details" class="hidden">
        <h2 id="detail-title"></h2>
        <p id="detail-desc"></p>
        <button onclick="goBack()">Back to Home</button>
    </div>

    <section id="main-content">
        <h2>Newest Projects</h2>
        <div id="project-list"></div>
    </section>
</div>

<script type="module">
    // ... Firebase imports ...
    // Firebase initialization...

    // Projeyi görüntüleme fonksiyonu
    window.viewProject = (title, desc) => {
        document.getElementById('main-content').classList.add('hidden');
        document.getElementById('project-details').classList.remove('hidden');
        document.getElementById('detail-title').innerText = title;
        document.getElementById('detail-desc').innerText = desc;
    };

    window.goBack = () => {
        document.getElementById('main-content').classList.remove('hidden');
        document.getElementById('project-details').classList.add('hidden');
    };

    // Listeleme kısmını güncelle
    onValue(ref(db, 'decks'), (snapshot) => {
        const list = document.getElementById('project-list');
        list.innerHTML = "";
        snapshot.forEach((child) => {
            const data = child.val();
            list.innerHTML += `
                <div class="card">
                    <h3>${data.title}</h3>
                    <button onclick="viewProject('${data.title}', '${data.description}')">View Details</button>
                </div>`;
        });
    });
</script>
</body>
</html>
